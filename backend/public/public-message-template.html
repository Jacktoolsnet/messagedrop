<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MessageDrop | Public message</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Public message on MessageDrop">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="MessageDrop">
  <meta property="og:title" content="MessageDrop | Public message">
  <meta property="og:description" content="Public message on MessageDrop">
  <meta property="og:url" content="https://messagedrop.de/m/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="MessageDrop | Public message">
  <meta name="twitter:description" content="Public message on MessageDrop">
  <link rel="canonical" href="https://messagedrop.de/m/">
  <link rel="icon" type="image/png" href="/icons/icon-192x192.png">
  <link rel="stylesheet" href="/site-assets/public-message.css">
</head>
<body>
  <main class="public-message-page">
    <section class="hero-card">
      <p class="eyebrow">MessageDrop</p>
      <h1 id="page-title">Loading public message…</h1>
      <p id="page-description" class="hero-copy">This message is currently loading.</p>
    </section>

    <section id="status-card" class="status-card" aria-live="polite"></section>

    <article id="message-card" class="message-card" hidden>
      <div class="message-preview">
        <div id="message-media-shell" class="message-media-shell" hidden>
          <div id="message-media-frame" class="message-media-frame">
            <img id="message-image" class="message-image" src="" alt="" hidden>
            <img id="message-image-overlay" class="message-image-overlay" src="/assets/images/sticker-protection-overlay.svg" alt="" aria-hidden="true" hidden>
            <div id="message-embed" class="message-embed" hidden></div>
          </div>

          <a id="media-attribution-link" class="inline-link media-attribution" href="#" target="_blank" rel="noopener noreferrer" hidden></a>
        </div>

        <div id="message-text-shell" class="message-shell">
          <p id="message-text" class="message-text"></p>
        </div>

        <div id="hashtag-list" class="hashtag-chip-list" hidden></div>

        <div class="message-actions">
          <div class="message-link-actions">
            <a id="open-app-link" class="button button-primary button-inline button-with-icon" href="/">
              <span class="button-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                  <path d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42 9.3-9.29H14V3Zm5 16V12h2v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5c0-1.1.9-2 2-2h7v2H5v14h14Z" fill="currentColor"/>
                </svg>
              </span>
              <span id="open-app-label">Open in MessageDrop</span>
            </a>
            <button id="copy-link-button" class="button button-secondary button-inline button-with-icon" type="button">
              <span class="button-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                  <path d="M16 1H4a2 2 0 0 0-2 2v12h2V3h12V1Zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm0 16H8V7h11v14Z" fill="currentColor"/>
                </svg>
              </span>
              <span id="copy-link-label">Copy link</span>
            </button>
          </div>
        </div>
      </div>
    </article>
  </main>

  <script src="/site-assets/public-message.js" defer></script>
</body>
</html>
