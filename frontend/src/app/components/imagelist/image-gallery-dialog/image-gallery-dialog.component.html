<div class="gallery">
  <div class="gallery-toolbar">
    <div class="gallery-title">
      <span class="gallery-file-name">{{ currentImage().fileName }}</span>
      @if (hasMultipleImages()) {
      <span class="gallery-position">{{ positionText() }}</span>
      }
    </div>
    <button mat-mini-fab type="button" class="gallery-close" (click)="close()"
      [attr.aria-label]="'common.actions.close' | transloco">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="gallery-stage">
    @if (hasMultipleImages()) {
    <button mat-fab type="button" class="gallery-nav gallery-nav--previous" (click)="previous()"
      [attr.aria-label]="'common.images.galleryPreviousAria' | transloco">
      <mat-icon>chevron_left</mat-icon>
    </button>
    }

    @if (currentImageUrl(); as url) {
    <img class="gallery-image" [src]="url" [alt]="currentImage().fileName"
      loading="eager" decoding="async" fetchpriority="high" />
    } @else {
    <div class="gallery-loading" aria-live="polite">
      <mat-icon aria-hidden="true">image</mat-icon>
    </div>
    }

    @if (previousImageUrl(); as url) {
    <img class="gallery-preload" [src]="url" alt="" aria-hidden="true" loading="eager" decoding="async" />
    }
    @if (nextImageUrl(); as url) {
    <img class="gallery-preload" [src]="url" alt="" aria-hidden="true" loading="eager" decoding="async" />
    }

    @if (hasMultipleImages()) {
    <button mat-fab type="button" class="gallery-nav gallery-nav--next" (click)="next()"
      [attr.aria-label]="'common.images.galleryNextAria' | transloco">
      <mat-icon>chevron_right</mat-icon>
    </button>
    }
  </div>
</div>
