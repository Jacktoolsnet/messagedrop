<app-dialog-header
  icon="add_location_alt"
  [title]="'common.images.exif.title' | transloco">
</app-dialog-header>

<mat-dialog-content class="dialog-content">
  @if (data.previewUrl) {
  <img [src]="data.previewUrl"
    [alt]="data.fileName || ('common.images.exif.previewAlt' | transloco)" class="preview" />
  }

  <div class="choice-actions">
    <button mat-stroked-button color="primary" class="choice-button" type="button" cdkFocusInitial
      [mat-dialog-close]="{ choice: 'image', applyToAll }"
      [attr.aria-label]="'common.images.exif.useImageLocationAria' | transloco">
      <span class="choice-button-content">
        @if (data.imageLocation) {
        <span [id]="imageMapId" class="choice-map" aria-hidden="true"></span>
        }
        <span class="choice-button-text">{{ 'common.images.exif.useImageLocation' | transloco }}</span>
      </span>
    </button>
    <button mat-stroked-button class="choice-button" type="button"
      [mat-dialog-close]="{ choice: 'map', applyToAll }"
      [attr.aria-label]="'common.images.exif.useMapLocationAria' | transloco">
      <span class="choice-button-content">
        @if (data.mapLocation) {
        <span [id]="mapLocationMapId" class="choice-map" aria-hidden="true"></span>
        }
        <span class="choice-button-text">{{ 'common.images.exif.useMapLocation' | transloco }}</span>
      </span>
    </button>
    <button mat-stroked-button class="choice-button" type="button"
      (click)="pickCustomLocation()"
      [attr.aria-label]="'common.images.exif.useCustomLocationAria' | transloco">
      <span class="choice-button-content">
        <span class="choice-icon" aria-hidden="true">
          <mat-icon>edit_location_alt</mat-icon>
        </span>
        <span class="choice-button-text">{{ 'common.images.exif.useCustomLocation' | transloco }}</span>
      </span>
    </button>
  </div>
</mat-dialog-content>
<mat-dialog-actions class="actions sticky-actions">
  <button mat-icon-button type="button" (click)="help.open('imageExif')"
    [attr.aria-label]="'common.actions.help' | transloco">
    <mat-icon>help</mat-icon>
  </button>
  <span class="actions-spacer" aria-hidden="true"></span>
  <mat-slide-toggle [(ngModel)]="applyToAll" color="primary">
    <span class="copy">{{ 'common.images.exif.remember' | transloco }}</span>
  </mat-slide-toggle>
</mat-dialog-actions>
