<app-dialog-header icon="forum" [title]="'common.secretDropComments.title' | transloco"></app-dialog-header>

<mat-dialog-content class="secret-comments-content">
  @if (comments().length === 0) {
  <p class="empty">{{ 'common.secretDropComments.empty' | transloco }}</p>
  } @else {
  <div class="comment-list">
    @for (comment of comments(); track comment.row.uuid) {
    <article class="comment-card">
      <app-showmessage [message]="comment.content.message" [style]="comment.content.style || ''"></app-showmessage>
      <small>{{ comment.row.createdAt * 1000 | date:'medium' }}</small>
    </article>
    }
  </div>
  }
</mat-dialog-content>

<mat-dialog-actions class="sticky-actions" align="end">
  <button mat-icon-button class="action-close" type="button" (click)="close()" [attr.aria-label]="'common.actions.close' | transloco">
    <mat-icon>close</mat-icon>
  </button>
  <button mat-icon-button color="primary" type="button" (click)="addComment()" [disabled]="loading()"
    [attr.aria-label]="'common.messageList.addCommentAria' | transloco">
    <mat-icon>add_comment</mat-icon>
  </button>
</mat-dialog-actions>
