<div class="image-tile"
     role="button"
     tabindex="0"
     (click)="openEditor()"
     (keyup.enter)="openEditor()"
     (keyup.space)="openEditor()">
  <div class="image-tile__header">
    <div class="image-tile__icon">
      <mat-icon>{{ icon }}</mat-icon>
    </div>
    <div class="image-tile__title">{{ title }}</div>
  </div>

  <div class="image-tile__body">
    @if (hasImages) {
      <div class="image-grid">
        @for (item of previewItems; track item.entry.id) {
          @if (item.missing) {
            <div class="missing">
              <mat-icon aria-hidden="true">broken_image</mat-icon>
              <div>{{ 'common.tiles.images.notFound' | transloco }}</div>
            </div>
          } @else {
            <button type="button" class="image-button" (click)="openGallery($event)"
              [attr.aria-label]="getImageAria(item)" [attr.title]="item.entry.fileName">
              <img
                [src]="item.src"
                [alt]="getImageAria(item)"
                loading="lazy"
                decoding="async"
                (error)="item.image && handleImageError(item.image, $event)"
              />
            </button>
          }
        }
      </div>
    } @else {
      <p class="text-muted">{{ 'common.tiles.images.empty' | transloco }}</p>
    }
  </div>
</div>
