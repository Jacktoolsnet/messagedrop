<app-dialog-header icon="inventory_2" [title]="title"></app-dialog-header>
<mat-dialog-content class="product-editor">
  <mat-form-field appearance="outline" class="product-name">
    <mat-label>{{ 'common.tiles.shopping.productName' | transloco }}</mat-label>
    <input matInput cdkFocusInitial [formControl]="nameControl" />
  </mat-form-field>
  <div class="value-grid">
    <mat-form-field appearance="outline">
      <mat-label>{{ 'common.tiles.shopping.quantity' | transloco }}</mat-label>
      <input matInput type="number" min="0.01" step="0.01" [formControl]="quantityControl" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>{{ 'common.tiles.shopping.unit' | transloco }}</mat-label>
      <mat-select [formControl]="unitControl">
        @for (unit of units; track unit) {
          <mat-option [value]="unit">{{ ('common.tiles.shopping.units.' + unit) | transloco }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>{{ 'common.tiles.shopping.price' | transloco }}</mat-label>
      <input matInput type="number" min="0" step="0.01" [formControl]="priceControl" />
    </mat-form-field>
  </div>
</mat-dialog-content>
<mat-dialog-actions class="sticky-actions" align="end">
  <button mat-icon-button class="action-close" type="button" (click)="close()" [attr.aria-label]="'common.cancel' | transloco"><mat-icon>close</mat-icon></button>
  <button mat-icon-button color="primary" type="button" (click)="save()" [disabled]="!nameControl.value.trim()" [attr.aria-label]="'common.save' | transloco"><mat-icon>save</mat-icon></button>
</mat-dialog-actions>
