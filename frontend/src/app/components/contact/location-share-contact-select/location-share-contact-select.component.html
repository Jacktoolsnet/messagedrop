<app-dialog-header icon="share_location" [title]="'common.share.locationContactSelectTitle' | transloco"></app-dialog-header>

<mat-dialog-content class="contact-select-content">
  @if (contacts().length === 0) {
  <div class="empty-state">
    <mat-icon>person_off</mat-icon>
    <p>{{ 'common.share.locationContactSelectEmpty' | transloco }}</p>
  </div>
  } @else {
  <div class="contact-list">
    @for (contact of contacts(); track contact.id) {
    <button type="button" class="contact-row" (click)="toggle(contact)">
      <span class="avatar" aria-hidden="true">
        @if (contact.base64Avatar) {
        <img [src]="contact.base64Avatar" [alt]="getContactDisplayName(contact)" />
        } @else {
        <mat-icon>person</mat-icon>
        }
      </span>
      <span class="contact-name">{{ getContactDisplayName(contact) }}</span>
      <mat-checkbox [checked]="isSelected(contact)" (click)="$event.stopPropagation()" (change)="toggle(contact)"
        [attr.aria-label]="getContactDisplayName(contact)"></mat-checkbox>
    </button>
    }
  </div>
  }
</mat-dialog-content>

<mat-dialog-actions class="sticky-actions contact-select-actions">
  <button mat-icon-button type="button" class="action-cancel" (click)="cancel()"
    [attr.aria-label]="'common.actions.cancel' | transloco">
    <mat-icon>close</mat-icon>
  </button>
  <span class="action-spacer"></span>
  <span class="action-group-right">
    <button mat-icon-button type="button" (click)="help.open('locationShareContacts')"
      [attr.aria-label]="'common.actions.help' | transloco">
      <mat-icon>help</mat-icon>
    </button>
    <button mat-icon-button color="primary" type="button" class="action-apply" (click)="share()"
      [disabled]="selectedCount() === 0" [attr.aria-label]="'common.actions.apply' | transloco">
      <mat-icon>check</mat-icon>
    </button>
  </span>
</mat-dialog-actions>
