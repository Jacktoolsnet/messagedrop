@if (showGifProvider) {
<div class="url-container">
    <input #searchInput type="search" enterkeyhint="search" [formControl]="searchControl" (keyup.enter)="search()"
        [placeholder]="'common.klipy.searchPlaceholder' | transloco" />

    <button type="button" class="kind-menu-button" [matMenuTriggerFor]="klipyKindMenu"
        [attr.aria-label]="'common.klipy.kindMenuLabel' | transloco">
        <span>{{ selectedKindLabel() }}</span>
        <mat-icon>expand_more</mat-icon>
    </button>
    <mat-menu #klipyKindMenu="matMenu" panelClass="accent-menu">
        <mat-radio-group class="klipy-kind-menu-group" [value]="selectedKind">
            @for (kind of mediaKinds; track kind) {
            <mat-radio-button [value]="kind" (change)="selectKind(kind)">
                {{ kindLabel(kind) }}
            </mat-radio-button>
            }
        </mat-radio-group>
    </mat-menu>

    <button class="search-button" (click)="search()">
        @if (
        (nextSearch === '' && searchControl.value !== '') ||
        (searchControl.value !== lastSearchTerm) ||
        (searchControl.value === '')
        ) {
        <mat-icon>search</mat-icon>
        } @else {
        <mat-icon>arrow_circle_right</mat-icon>
        }
    </button>

</div>

<mat-dialog-content>
    @if (results.length > 0) {
    <div class="gallery">
        @for (result of results; track result.id) {
        <div>
            <button type="button" class="gif-button" (click)="onApplyClick(result)" aria-label="Select GIF">
                @if (isClipResult(result)) {
                <video [src]="getPreviewUrl(result)" [attr.aria-label]="result.content_description || result.title || 'Clip result'"
                    muted loop playsinline preload="metadata"></video>
                } @else {
                <img [src]="getPreviewUrl(result)"
                    [alt]="result.content_description || result.title || 'KLIPY media result'"
                    loading="lazy"
                    decoding="async" />
                }
            </button>
        </div>
        }
    </div>
    }
</mat-dialog-content>
} @else {
<div class="platform-tile-container">
    <div class="platform-tile">
        <app-enable-external-content [platform]="'klipy'" (enabledChange)="onEnabledChange($event)">
        </app-enable-external-content>
    </div>
</div>
}

<mat-dialog-actions class="sticky-actions" align="end">
    <button mat-dialog-close mat-icon-button class="action-close" [attr.aria-label]="'common.actions.close' | transloco">
        <mat-icon>close</mat-icon>
    </button>
    <button mat-icon-button type="button" (click)="help.open('gifSearch')"
        [attr.aria-label]="'common.actions.help' | transloco">
        <mat-icon>help</mat-icon>
    </button>
</mat-dialog-actions>
