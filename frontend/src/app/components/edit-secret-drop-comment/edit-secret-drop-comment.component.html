<app-dialog-header icon="add_comment" [title]="(data?.titleKey || 'common.secretDropComments.addTitle') | transloco"></app-dialog-header>

<mat-dialog-content class="comment-edit-content">
  <div class="content-grid">
    <div class="oembed_container">
      @if (!hasMultimedia) {
      <app-select-multimedia class="multimedia-box" (newMultimedia)="applyNewMultimedia($event)"></app-select-multimedia>
      } @else {
      <button mat-mini-fab color="primary" class="button_remove_multimedia" (click)="removeMultimedia()" [attr.aria-label]="'common.actions.delete' | transloco">
        <mat-icon>delete</mat-icon>
      </button>
      <div class="multimedia-preview"><app-showmultimedia [multimedia]="multimedia"></app-showmultimedia></div>
      }
    </div>

    @if (text === '') {
    <div class="text_container">
      <button (click)="openTextDialog()" mat-flat-button class="button_default" color="primary">
        <span>{{ 'common.message.addText' | transloco }}</span>
      </button>
    </div>
    } @else {
    <div class="text_container">
      <button mat-mini-fab class="button_random" color="secondary" [attr.aria-label]="'common.actions.chooseFont' | transloco" (click)="onFontClick()">
        <mat-icon>brand_family</mat-icon>
      </button>
      <button mat-mini-fab color="primary" class="button_remove_text" (click)="removeText()" [attr.aria-label]="'common.actions.delete' | transloco">
        <mat-icon>delete</mat-icon>
      </button>
      <p class="text" role="button" tabindex="0" (click)="openTextDialog()" (keyup.enter)="openTextDialog()" (keyup.space)="openTextDialog()" [style]="style">{{ text }}</p>
    </div>
    }
  </div>
</mat-dialog-content>

<mat-dialog-actions class="sticky-actions" align="end">
  <button mat-icon-button class="action-close" type="button" (click)="close()" [attr.aria-label]="'common.actions.abort' | transloco"><mat-icon>close</mat-icon></button>
  <button mat-icon-button color="primary" type="button" (click)="save()" [disabled]="!hasContent" [attr.aria-label]="'common.actions.save' | transloco"><mat-icon>check</mat-icon></button>
</mat-dialog-actions>
