<div class="chart-card" [class.tall]="tall()" [style.--chart-accent]="color()">
  <div class="chart-header">
    <div class="avatar chart-avatar">
      <mat-icon aria-hidden="true" class="header-icon">{{ iconName() || 'insights' }}</mat-icon>
    </div>
    <div class="header-copy">
      <div class="header-title">{{ title() }}</div>
      <div class="header-subtitle">{{ chartKind() === 'bar' ? 'Short-range distribution' : 'Trend overview' }}</div>
    </div>
  </div>
  <div class="chart-body">
    <canvas #canvas></canvas>
  </div>
</div>
