<app-dialog-header
  icon="location_on"
  [title]="title"
  [subtitle]="subtitle">
</app-dialog-header>

<mat-dialog-content class="dialog-content">
  <section class="selection-summary">
    <div class="selection-summary-main">
      <div class="selection-icon">
        <mat-icon>location_on</mat-icon>
      </div>

      <div class="selection-copy">
        <strong>{{ selectedLabel() }}</strong>
        <span>{{ selectedCoordinatesText() }}</span>
      </div>
    </div>

    @if (reverseLookupPending()) {
      <mat-progress-bar mode="indeterminate"></mat-progress-bar>
    }
  </section>

  <div #mapElement class="map-container" aria-label="Location picker map"></div>
</mat-dialog-content>

<app-dialog-action-bar>
  <button mat-button type="button" class="action-close" (click)="close()">{{ i18n.t('Cancel') }}</button>
  <button mat-flat-button color="primary" type="button" (click)="apply()">{{ i18n.t('Use location') }}</button>
</app-dialog-action-bar>
