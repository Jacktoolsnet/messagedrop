<div class="dialog-header">
  <div class="dialog-copy">
    <h2 mat-dialog-title>Adjust location on map</h2>
    <p>Tap the map to refine the selected location. The address is resolved automatically.</p>
  </div>

  <button mat-icon-button type="button" (click)="close()" aria-label="Close location map dialog">
    <mat-icon>close</mat-icon>
  </button>
</div>

<mat-dialog-content class="dialog-content">
  <section class="selection-summary">
    <div class="selection-summary-main">
      <div class="selection-icon">
        <mat-icon>location_on</mat-icon>
      </div>

      <div class="selection-copy">
        <strong>{{ selectedLabel() }}</strong>
        <span>{{ selectedCoordinatesText() }}</span>
      </div>
    </div>

    @if (reverseLookupPending()) {
      <mat-progress-bar mode="indeterminate"></mat-progress-bar>
    }

    @if (reverseLookupError()) {
      <p class="selection-error">{{ reverseLookupError() }}</p>
    }
  </section>

  <div #mapElement class="map-container" aria-label="Location picker map"></div>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-actions">
  <a mat-button [href]="locationMapLink()" target="_blank" rel="noopener">
    Open in OpenStreetMap
  </a>
  <button mat-button type="button" (click)="close()">Cancel</button>
  <button mat-flat-button color="primary" type="button" (click)="apply()">Use location</button>
</mat-dialog-actions>
