<app-dialog-header
    icon="notifications_active"
    [title]="i18n.t('Send Notification')">
</app-dialog-header>

<mat-dialog-content class="content">
    <form [formGroup]="form">
        <mat-form-field appearance="outline" class="full">
            <mat-label>{{ i18n.t('Recipient') }}</mat-label>
            <mat-select formControlName="channel">
                @for (c of channels; track c.value) {
                <mat-option [value]="c.value">{{ c.label }}</mat-option>
                }
            </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
            <mat-label>{{ i18n.t('Subject') }}</mat-label>
            <input matInput formControlName="subject" maxlength="120" />
            <mat-hint align="end">{{ form.controls.subject.value.length || 0 }}/120</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full">
            <mat-label>{{ i18n.t('Message') }}</mat-label>
            <textarea matInput formControlName="message" rows="5" maxlength="2000"></textarea>
            <mat-hint align="end">{{ form.controls.message.value.length || 0 }}/2000</mat-hint>
        </mat-form-field>

        <mat-slide-toggle formControlName="sendEmail">
            {{ i18n.t('Also send via email') }}
        </mat-slide-toggle>
    </form>
</mat-dialog-content>

<app-dialog-action-bar>
    <button mat-stroked-button class="action-close" (click)="close()">{{ i18n.t('Cancel') }}</button>
    <button mat-flat-button color="primary" (click)="send()" [disabled]="sending()">
        <mat-icon>send</mat-icon>
        {{ i18n.t('Send') }}
    </button>
</app-dialog-action-bar>
