<app-dialog-header
  icon="add_alert"
  [title]="i18n.t('Add Notification')">
</app-dialog-header>

<form [formGroup]="form" class="dialog-content" (ngSubmit)="submit()">
  <mat-form-field appearance="outline">
    <mat-label>{{ i18n.t('Stakeholder') }}</mat-label>
    <mat-select formControlName="stakeholder" required>
      <mat-option value="reporter">{{ i18n.t('Reporter') }}</mat-option>
      <mat-option value="uploader">{{ i18n.t('Uploader') }}</mat-option>
      <mat-option value="other">{{ i18n.t('Other') }}</mat-option>
    </mat-select>
  </mat-form-field>

  <!-- Für "other" freie E-Mail-Adresse angeben -->
  @if (isOther()) {
  <mat-form-field appearance="outline">
    <mat-label>{{ i18n.t('Email') }}</mat-label>
    <input matInput formControlName="otherEmail" placeholder="name@example.com" required />
  </mat-form-field>
  }

  <!-- Subject immer anzeigen -->
  <mat-form-field appearance="outline">
    <mat-label>{{ i18n.t('Subject') }}</mat-label>
    <input matInput formControlName="subject" [placeholder]="i18n.t('Enter subject')" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>{{ i18n.t('Message') }}</mat-label>
    <textarea matInput formControlName="body" rows="4" [placeholder]="i18n.t('Enter message')" required></textarea>
    <mat-hint>{{ i18n.t('Will be delivered to the selected stakeholder.') }}</mat-hint>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>{{ i18n.t('Event (optional)') }}</mat-label>
    <input matInput formControlName="event" [placeholder]="i18n.t('Custom event identifier')" />
  </mat-form-field>

  <app-dialog-action-bar>
    <button mat-button type="button" class="action-close" (click)="cancel()">{{ i18n.t('Cancel') }}</button>
    <button mat-flat-button color="primary" type="submit">{{ i18n.t('Create') }}</button>
  </app-dialog-action-bar>
</form>
