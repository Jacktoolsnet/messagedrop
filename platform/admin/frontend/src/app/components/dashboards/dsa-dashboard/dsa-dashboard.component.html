<mat-toolbar color="primary">
  <!-- Home -->
  <button mat-icon-button routerLink="/dashboard" [attr.aria-label]="i18n.t('Dashboard Home')">
    <mat-icon>home</mat-icon>
  </button>

  <!-- Titel -->
  <span class="toolbar-title">
    {{ i18n.t('Digital Services Act') }}
  </span>
</mat-toolbar>

<!-- Ladeindikator (optional, hübsch) -->
@if (loading()) {
  <mat-progress-bar mode="indeterminate"></mat-progress-bar>
}

<div class="page">
  <div class="tiles-container">
    @for (tile of tiles; track trackByKey($index, tile)) {
      <mat-card class="tile" appearance="raised" [routerLink]="tile.route">
        <mat-card-header>
          <div mat-card-avatar [class]="avatarClass(tile)" [matBadge]="badgeCount(tile)" matBadgeOverlap="false"
            [matBadgeColor]="badgeColor(tile)" [matBadgeHidden]="!showBadge(tile)">
            <mat-icon>{{ tile.icon }}</mat-icon>
          </div>

          <mat-card-title class="tile-title">{{ tile.title }}</mat-card-title>
          <mat-card-subtitle class="tile-subtitle">{{ tile.subtitle }}</mat-card-subtitle>
        </mat-card-header>

      </mat-card>
    }
  </div>
</div>
