<app-dialog-header
  [icon]="data.warn ? 'warning' : 'help'"
  [title]="i18n.t(data.title || 'Are you sure?')">
</app-dialog-header>

<mat-dialog-content class="confirm-content">
  <div class="confirm-box">{{ i18n.t(data.message || 'Please confirm this action.') }}</div>
</mat-dialog-content>

<app-dialog-action-bar>
  <button mat-stroked-button type="button" class="action-close" (click)="cancel()">
    {{ i18n.t(data.cancelText || 'Cancel') }}
  </button>
  <button mat-raised-button [color]="data.warn ? 'warn' : 'primary'" type="button" (click)="confirm()">
    {{ i18n.t(data.confirmText || 'Confirm') }}
  </button>
</app-dialog-action-bar>
